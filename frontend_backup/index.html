<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Multi-Signature Wallet DApp — A shared treasury requiring M-of-N owner approvals before executing transactions.">
    <title>MultiSig Wallet — DApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- ═══════════════════════════════════════════════════ -->
    <!--  Animated Background                                -->
    <!-- ═══════════════════════════════════════════════════ -->
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <!-- ═══════════════════════════════════════════════════ -->
    <!--  Header                                             -->
    <!-- ═══════════════════════════════════════════════════ -->
    <header id="app-header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="m7 11 0-4a5 5 0 0 1 10 0l0 4"/>
                    </svg>
                </div>
                <h1>MultiSig<span class="accent">Vault</span></h1>
            </div>
            <div class="header-right">
                <div id="network-badge" class="badge badge-network hidden">
                    <span class="pulse-dot"></span>
                    <span id="network-name">--</span>
                </div>
                <button id="btn-connect" class="btn btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    Connect Wallet
                </button>
                <div id="wallet-info" class="wallet-info hidden">
                    <div class="wallet-address" id="wallet-address">0x0000...0000</div>
                    <div id="owner-badge" class="badge badge-owner hidden">Owner</div>
                </div>
            </div>
        </div>
    </header>

    <!-- ═══════════════════════════════════════════════════ -->
    <!--  Main Content                                       -->
    <!-- ═══════════════════════════════════════════════════ -->
    <main id="app-main">
        <!-- Status Cards -->
        <section class="status-cards" id="status-section">
            <div class="card status-card" id="card-balance">
                <div class="card-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                </div>
                <div class="card-data">
                    <span class="card-label">Vault Balance</span>
                    <span class="card-value" id="vault-balance">--</span>
                    <span class="card-sub">ETH</span>
                </div>
            </div>
            <div class="card status-card" id="card-owners">
                <div class="card-icon icon-purple">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <div class="card-data">
                    <span class="card-label">Owners</span>
                    <span class="card-value" id="owner-count">--</span>
                    <span class="card-sub">signers</span>
                </div>
            </div>
            <div class="card status-card" id="card-threshold">
                <div class="card-icon icon-amber">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <div class="card-data">
                    <span class="card-label">Threshold</span>
                    <span class="card-value" id="threshold-value">--</span>
                    <span class="card-sub">required approvals</span>
                </div>
            </div>
            <div class="card status-card" id="card-txcount">
                <div class="card-icon icon-teal">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                    </svg>
                </div>
                <div class="card-data">
                    <span class="card-label">Transactions</span>
                    <span class="card-value" id="tx-count">--</span>
                    <span class="card-sub">total submitted</span>
                </div>
            </div>
        </section>

        <!-- Owner List -->
        <section class="card owners-section" id="owners-section">
            <div class="card-header">
                <h2>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    Wallet Owners
                </h2>
            </div>
            <div id="owners-list" class="owners-list">
                <p class="text-muted">Connect wallet to view owners</p>
            </div>
        </section>

        <!-- Submit Transaction Form -->
        <section class="card submit-section" id="submit-section">
            <div class="card-header">
                <h2>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Submit New Transaction
                </h2>
            </div>
            <form id="submit-form" class="submit-form">
                <div class="form-group">
                    <label for="input-to">Recipient Address</label>
                    <input type="text" id="input-to" placeholder="0x..." required autocomplete="off">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="input-value">Value (ETH)</label>
                        <input type="text" id="input-value" placeholder="0.0" value="0" required>
                    </div>
                    <div class="form-group">
                        <label for="input-data">Calldata (hex)</label>
                        <input type="text" id="input-data" placeholder="0x (empty for ETH transfer)" value="0x">
                    </div>
                </div>
                <button type="submit" id="btn-submit-tx" class="btn btn-primary btn-full" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                    Submit Transaction
                </button>
            </form>
        </section>

        <!-- Transactions Table -->
        <section class="card transactions-section" id="transactions-section">
            <div class="card-header">
                <h2>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                    </svg>
                    Transactions
                </h2>
                <button id="btn-refresh" class="btn btn-ghost" title="Refresh">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                </button>
            </div>
            <div id="transactions-list" class="transactions-list">
                <p class="text-muted">No transactions yet</p>
            </div>
        </section>
    </main>

    <!-- ═══════════════════════════════════════════════════ -->
    <!--  Toast Container                                    -->
    <!-- ═══════════════════════════════════════════════════ -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
